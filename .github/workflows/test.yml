name: Run tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (RISC-V toolchain + Verilator)
        run: bash install_toolchain.sh

      - name: Run RISC-V ISA test suite
        run: bash dpi-riscv/tests/run_riscv_tests.sh

      - name: Run all simulation / firmware / make tests
        run: bash dpi-riscv/tests/test.sh
